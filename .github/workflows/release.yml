name: Build and release

# Build the Linux and Windows binaries and attach them to a GitHub Release on a
# version tag. Nothing built is committed to the repo; the release page hosts the
# binaries. Also runs on manual dispatch to sanity check the build without a tag.
#
# Security notes:
# - Default token permissions are read-only. Only the separate `release` job,
#   which does nothing but download the built artifacts and attach them, is
#   granted contents:write. The build jobs (which run third-party actions like the
#   Nim setup) never see a write-capable token.
# - Every action is pinned to a full commit SHA (the trailing comment is the tag
#   it corresponds to) so a moved tag cannot swap in different code.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        # No PCRE package here: the vendored PCRE source is built and linked
        # statically by the build (modern distros no longer package PCRE1).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            zenity xvfb imagemagick librsvg2-bin

      - name: Install Nim
        uses: jiro4989/setup-nim-action@cb1fc1270b117457dd0d9f610ec981fad3369cec # v2
        with:
          nim-version: "2.2.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install nimble dependencies
        run: |
          nimble install -y "markdown@0.8.8"
          nimble install -y "tinyfiledialogs@3.21.3"

      - name: Build
        run: make build

      - name: Test (unit + headless smoke)
        run: |
          make unit
          xvfb-run -a ./build/zmarkdown --self-test
          # PCRE must be linked in statically: the binary must not carry the
          # dlopen reference to the system libpcre, which modern distros no
          # longer ship.
          if grep -q "libpcre\.so" build/zmarkdown; then
            echo "error: binary still references the dynamic libpcre" >&2
            exit 1
          fi

      - name: Package tarball
        run: make dist

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zmarkdown-linux
          path: dist/*.tar.gz

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nim
        uses: jiro4989/setup-nim-action@cb1fc1270b117457dd0d9f610ec981fad3369cec # v2
        with:
          nim-version: "2.2.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install nimble dependencies
        run: |
          nimble install -y "markdown@0.8.8"
          nimble install -y "tinyfiledialogs@3.21.3"

      - name: Fetch WebView2 SDK headers (not bundled in this repo)
        shell: pwsh
        # Microsoft's WebView2 SDK is under Microsoft's own license and is kept
        # out of this repository; download its headers from NuGet at build time.
        run: ./scripts/fetch-webview2.ps1

      - name: Build the vendored PCRE (static)
        shell: bash
        # Statically linked so the exe does not look for pcre64.dll at runtime,
        # which stock Windows does not have.
        run: bash scripts/build-pcre.sh

      - name: Compile Windows resource (icon + version info)
        shell: bash
        run: |
          mkdir -p build
          # Build the .ico from the committed 128px PNG with ImageMagick (on the
          # runner as 'magick'). The SVG rasterizer gen-icons.sh needs is not
          # available on the Windows runner.
          magick src/ui/assets/icon-128.png -define icon:auto-resize=256,128,64,48,32,16 src/ui/assets/icon.ico
          cp src/ui/assets/icon.ico packaging/windows/icon.ico
          windres packaging/windows/zmarkdown.rc -O coff -o build/zmarkdown.res

      - name: Build
        shell: bash
        env:
          ZMARKDOWN_RES: build/zmarkdown.res
        run: |
          mkdir -p build
          nim cpp -d:release --hints:off -o:build/zmarkdown.exe src/zmarkdown.nim

      - name: Package zip
        shell: bash
        run: |
          version="$(grep -oP '^version\s*=\s*"\K[^"]+' zmarkdown.nimble | head -1)"
          name="zmarkdown-${version}-windows-x86_64"
          mkdir -p "dist/$name"
          cp build/zmarkdown.exe "dist/$name/zmarkdown.exe"
          cp README.md "dist/$name/README.md"
          cp src/ui/assets/icon.ico "dist/$name/zmarkdown.ico"
          cd dist && 7z a "${name}.zip" "$name" >/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zmarkdown-windows
          path: dist/*.zip

  release:
    # Only this job gets write access, and it runs no third-party build tooling:
    # it just collects the built artifacts and attaches them to the release.
    needs: [linux, windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist

      - name: Attach to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
